<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Pinball</title>
  <meta name="description" content="범퍼가 매판 랜덤하게 배치되는 캔버스 핀볼 게임" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrap">
    <h1>🎯 Random Pinball</h1>

    <div class="hud">
      <div class="hud-score">SCORE <span id="score">0</span></div>
      <div class="hud-balls">BALL <span id="balls">●●●</span></div>
    </div>

    <div class="board-frame">
      <canvas id="board" width="400" height="700"></canvas>
      <div id="overlay" class="overlay">스페이스바를 눌러 발사하세요</div>
    </div>

    <p class="controls">
      ⬅ / Z : 왼쪽 플리퍼 &nbsp;|&nbsp; ➡ / M : 오른쪽 플리퍼 &nbsp;|&nbsp; SPACE : 발사 &nbsp;|&nbsp; R : 다시 시작
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
